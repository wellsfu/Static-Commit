<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0F0F1A">
  <meta name="format-detection" content="telephone=no">
  <title>UWU ~ 討伐 — FF14</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <main class="page-home">
    <button class="log-btn" id="logBtn" title="本週修改紀錄">🕐</button>
    <header class="home-header">
      <span class="home-icon">⚔️</span>
      <h1 class="home-title">UWU ~ 討伐</h1>
      <div class="week-nav">
        <button class="week-nav__btn" id="prevWeek">‹</button>
        <span class="week-nav__label" id="weekLabel">載入中...</span>
        <button class="week-nav__btn" id="nextWeek">›</button>
      </div>
    </header>

    <hr class="divider">

    <section class="section">
      <h2 class="section-label">誰是你？</h2>
      <div class="member-grid" id="memberGrid">
        <!-- 由 JS 動態生成 -->
      </div>
    </section>

    <hr class="divider">

    <section class="section">
      <div class="fill-status__label">
        <span>填寫狀態</span>
        <span id="fillCount">0 / 8 人</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progressFill" style="width: 0%"></div>
      </div>
      <p class="fill-status__missing" id="missingMembers"></p>
    </section>

    <section class="section" style="padding-top: 0; padding-bottom: var(--space-3)">
      <div class="week-note" id="weekNote" title="點擊編輯公告">
        <span class="week-note__icon">📌</span>
        <span class="week-note__text week-note__text--empty" id="weekNoteText">點此新增本週公告…</span>
        <input class="week-note__input" id="weekNoteInput" type="text" maxlength="80"
               autocomplete="off" placeholder="例：週三 20:00 出發">
        <button class="week-note__edit" id="weekNoteEdit" title="編輯公告">✏</button>
      </div>
    </section>

    <section class="section" style="padding-top: 0">
      <a href="overview.html" class="btn btn--outline btn--full" id="overviewLink">
        📊 查看本週總覽
      </a>
    </section>

    <hr class="divider">

    <section class="section">
      <h2 class="section-label">廢話留言板</h2>
      <div class="board-messages" id="boardMessages">
        <div class="board-empty">載入中…</div>
      </div>
      <div class="board-compose">
        <div class="board-input-row">
          <select class="board-who" id="boardWho">
            <option value="">我是…</option>
          </select>
          <input class="board-input" id="boardInput" type="text" maxlength="200"
                 placeholder="說點什麼…" autocomplete="off">
          <button class="btn btn--primary board-send" id="boardSend">送</button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-overlay hidden" id="nicknameModal">
    <div class="modal-card">
      <p class="modal-title" id="modalTitle">更改資料</p>

      <div class="modal-field">
        <label class="modal-label" for="nicknameInput">暱稱</label>
        <input class="modal-input" id="nicknameInput" type="text" maxlength="12"
               autocomplete="off" placeholder="輸入暱稱">
      </div>

      <div class="modal-field">
        <label class="modal-label" for="jobInput">職業</label>
        <input class="modal-input modal-input--sm" id="jobInput" type="text"
               list="ff14JobList" maxlength="10" autocomplete="off"
               placeholder="選擇或輸入職業名稱">
        <datalist id="ff14JobList"></datalist>
      </div>

      <div class="modal-field">
        <label class="modal-label">位置</label>
        <div class="modal-position-grid" id="positionGrid"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn--outline" id="modalCancel">取消</button>
        <button class="btn btn--primary" id="modalSave">儲存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="logModal">
    <div class="modal-card modal-card--log">
      <div class="log-modal-header">
        <p class="modal-title">本週修改紀錄</p>
        <button class="modal-close-btn" id="logModalClose">×</button>
      </div>
      <div id="logList" class="log-list"></div>
    </div>
  </div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
